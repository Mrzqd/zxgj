services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: renovation
      POSTGRES_USER: renovation
      POSTGRES_PASSWORD: renovation
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renovation -d renovation"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/renovation-assets;
      mc anonymous set download local/renovation-assets;
      "

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://renovation:renovation@db:5432/renovation
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173
      S3_BUCKET: renovation-assets
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_BASE_URL: /renovation-assets
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: ${AWS_REGION:-us-east-1}
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai_compatible}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api-inference.modelscope.cn/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-4096}
      EMBEDDING_INDEX_DIMENSIONS: ${EMBEDDING_INDEX_DIMENSIONS:-1536}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-20}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-openai_compatible}
      RERANK_MODEL: ${RERANK_MODEL:-bge-reranker-v2.5-gemma2-lightweight}
      RERANK_API_BASE: ${RERANK_API_BASE:-https://api-inference.modelscope.cn/v1}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_TIMEOUT_SECONDS: ${RERANK_TIMEOUT_SECONDS:-20}
      RAG_CANDIDATE_LIMIT: ${RAG_CANDIDATE_LIMIT:-24}
      RAG_CONTEXT_MAX_CHARS: ${RAG_CONTEXT_MAX_CHARS:-9000}
      RAG_CONTEXT_PER_SOURCE_MAX_CHARS: ${RAG_CONTEXT_PER_SOURCE_MAX_CHARS:-2400}
      RAG_NEIGHBOR_WINDOW: ${RAG_NEIGHBOR_WINDOW:-1}
      KNOWLEDGE_CHUNK_TARGET_CHARS: ${KNOWLEDGE_CHUNK_TARGET_CHARS:-1800}
      KNOWLEDGE_CHUNK_MAX_CHARS: ${KNOWLEDGE_CHUNK_MAX_CHARS:-3200}
      KNOWLEDGE_EMBEDDING_MAX_CHARS: ${KNOWLEDGE_EMBEDDING_MAX_CHARS:-12000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-knowledge-index}
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_BASE: ${LLM_API_BASE:-https://api-inference.modelscope.cn/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-900}
      MINERU_API_BASE: ${MINERU_API_BASE:-https://mineru.net}
      MINERU_API_TOKEN: ${MINERU_API_TOKEN:-}
      MINERU_MODEL_VERSION: ${MINERU_MODEL_VERSION:-pipeline}
      MINERU_TIMEOUT_SECONDS: ${MINERU_TIMEOUT_SECONDS:-60}
      MINERU_DOWNLOAD_TIMEOUT_SECONDS: ${MINERU_DOWNLOAD_TIMEOUT_SECONDS:-300}
      MINERU_POLL_INTERVAL_SECONDS: ${MINERU_POLL_INTERVAL_SECONDS:-5}
      MINERU_POLL_TIMEOUT_SECONDS: ${MINERU_POLL_TIMEOUT_SECONDS:-900}
      MINERU_RETRY_ATTEMPTS: ${MINERU_RETRY_ATTEMPTS:-3}
      MINERU_RETRY_BACKOFF_SECONDS: ${MINERU_RETRY_BACKOFF_SECONDS:-2}
      MINERU_DOWNLOAD_RETRY_ATTEMPTS: ${MINERU_DOWNLOAD_RETRY_ATTEMPTS:-8}
      MINERU_DOWNLOAD_RETRY_BACKOFF_SECONDS: ${MINERU_DOWNLOAD_RETRY_BACKOFF_SECONDS:-3}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/knowledge:/app/app/knowledge
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  knowledge-worker:
    build: ./backend
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+psycopg://renovation:renovation@db:5432/renovation
      SECRET_KEY: change-me-in-production
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai_compatible}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api-inference.modelscope.cn/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-4096}
      EMBEDDING_INDEX_DIMENSIONS: ${EMBEDDING_INDEX_DIMENSIONS:-1536}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-20}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-knowledge-index}
      KNOWLEDGE_CHUNK_TARGET_CHARS: ${KNOWLEDGE_CHUNK_TARGET_CHARS:-1800}
      KNOWLEDGE_CHUNK_MAX_CHARS: ${KNOWLEDGE_CHUNK_MAX_CHARS:-3200}
      KNOWLEDGE_EMBEDDING_MAX_CHARS: ${KNOWLEDGE_EMBEDDING_MAX_CHARS:-12000}
    volumes:
      - ./backend/app/knowledge:/app/app/knowledge
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
  redis-data:
